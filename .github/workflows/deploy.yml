name: Build & Deploy to Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag. Empty uses the short git SHA.'
        required: false
        default: ''
      services:
        description: 'Deploy services: auto, all, or comma-separated api,ui,scheduler.'
        required: false
        default: 'auto'

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.value }}
      owner_lc: ${{ steps.lc.outputs.value }}
    steps:
      - uses: actions/checkout@v5

      - id: set-tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - id: lc
        shell: bash
        run: echo "value=$(echo '${{ env.OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  read-deploy-state:
    needs: prepare
    if: github.ref == 'refs/heads/master'
    runs-on: [self-hosted, speedrunners-prod]
    timeout-minutes: 5
    outputs:
      api_sha: ${{ steps.state.outputs.api_sha }}
      ui_sha: ${{ steps.state.outputs.ui_sha }}
      scheduler_sha: ${{ steps.state.outputs.scheduler_sha }}
      compose_sha: ${{ steps.state.outputs.compose_sha }}
    steps:
      - id: state
        shell: bash
        run: |
          state_dir="${SRLAB_APP_DIR:-/root/home/srlab}/.deploy-state"
          read_state() {
            local name="$1"
            local file="${state_dir}/${name}.sha"
            if [ -f "$file" ]; then
              tr -d '[:space:]' < "$file"
            fi
          }
          echo "api_sha=$(read_state api)" >> "$GITHUB_OUTPUT"
          echo "ui_sha=$(read_state ui)" >> "$GITHUB_OUTPUT"
          echo "scheduler_sha=$(read_state scheduler)" >> "$GITHUB_OUTPUT"
          echo "compose_sha=$(read_state compose)" >> "$GITHUB_OUTPUT"

  detect-changes:
    needs: [prepare, read-deploy-state]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      build_api: ${{ steps.detect.outputs.build_api }}
      build_ui: ${{ steps.detect.outputs.build_ui }}
      build_scheduler: ${{ steps.detect.outputs.build_scheduler }}
      deploy_services: ${{ steps.detect.outputs.deploy_services }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - id: detect
        shell: bash
        env:
          DEPLOY_SERVICE_SELECTION: ${{ github.event.inputs.services }}
          DEPLOY_STATE_API_SHA: ${{ needs.read-deploy-state.outputs.api_sha }}
          DEPLOY_STATE_UI_SHA: ${{ needs.read-deploy-state.outputs.ui_sha }}
          DEPLOY_STATE_SCHEDULER_SHA: ${{ needs.read-deploy-state.outputs.scheduler_sha }}
          DEPLOY_STATE_COMPOSE_SHA: ${{ needs.read-deploy-state.outputs.compose_sha }}
        run: bash scripts/detect-deploy-services.sh

      - name: Package deployment files
        shell: bash
        run: |
          mkdir -p deploy-files/scripts
          cp docker-compose.prod.yml deploy-files/
          cp scripts/deploy-prod.sh deploy-files/scripts/

      - uses: actions/upload-artifact@v6
        with:
          name: deploy-files
          path: deploy-files/
          retention-days: 1

  build-api:
    needs: [prepare, detect-changes]
    if: github.ref == 'refs/heads/master' && needs.detect-changes.outputs.build_api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./SpeedRunners.API
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-api:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-api:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-ui:
    needs: [prepare, detect-changes]
    if: github.ref == 'refs/heads/master' && needs.detect-changes.outputs.build_ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./SpeedRunners.UI
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-ui:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-ui:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,scope=ui,mode=max

  build-scheduler:
    needs: [prepare, detect-changes]
    if: github.ref == 'refs/heads/master' && needs.detect-changes.outputs.build_scheduler == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./SpeedRunners.Scheduler
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-scheduler:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-scheduler:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=scheduler
          cache-to: type=gha,scope=scheduler,mode=max

  deploy:
    needs: [prepare, read-deploy-state, detect-changes, build-api, build-ui, build-scheduler]
    if: >
      ${{
        always() &&
        github.ref == 'refs/heads/master' &&
        needs.prepare.result == 'success' &&
        needs.read-deploy-state.result == 'success' &&
        needs.detect-changes.result == 'success' &&
        needs.detect-changes.outputs.deploy_services != '' &&
        (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
        (needs.build-ui.result == 'success' || needs.build-ui.result == 'skipped') &&
        (needs.build-scheduler.result == 'success' || needs.build-scheduler.result == 'skipped')
      }}
    runs-on: [self-hosted, speedrunners-prod]
    timeout-minutes: 30
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
      actions: read
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: deploy-files
          path: deploy-files

      - name: Roll out new images on ECS
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          GHCR_OWNER: ${{ needs.prepare.outputs.owner_lc }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_URL: ${{ github.server_url }}/${{ github.repository }}.git
          DEPLOY_BRANCH: master
          COMPOSE_PARALLEL_LIMIT: "1"
          DEPLOY_STEP_TIMEOUT_SECONDS: "900"
          DEPLOY_LOW_IMPACT_SLEEP_SECONDS: "8"
          DEPLOY_PULL_RETRIES: "5"
          DEPLOY_PULL_RETRY_SLEEP_SECONDS: "20"
          PRUNE_IMAGES: "false"
          DEPLOY_SERVICES: ${{ needs.detect-changes.outputs.deploy_services }}
          SKIP_REPOSITORY_SYNC: "true"
        run: |
          app_dir="${SRLAB_APP_DIR:-/root/home/srlab}"
          echo "==> App dir: $app_dir"
          echo "==> Deploy services: ${DEPLOY_SERVICES}"
          echo "==> Downloaded deployment files"
          find deploy-files -maxdepth 4 -type f -print | sort

          compose_file="$(find deploy-files -name docker-compose.prod.yml -type f | head -1)"
          deploy_script="$(find deploy-files -path '*/scripts/deploy-prod.sh' -type f | head -1)"
          if [ -z "$compose_file" ] || [ -z "$deploy_script" ]; then
            echo "Missing deployment artifact files" >&2
            echo "compose_file=${compose_file:-<missing>}" >&2
            echo "deploy_script=${deploy_script:-<missing>}" >&2
            exit 1
          fi

          mkdir -p "$app_dir/scripts"
          cp "$compose_file" "$app_dir/docker-compose.prod.yml"
          cp "$deploy_script" "$app_dir/scripts/deploy-prod.sh"
          chmod +x "$app_dir/scripts/deploy-prod.sh"
          test -f "$app_dir/SpeedRunners.API/SpeedRunners/appsettings.Production.json" || echo "Missing appsettings.Production.json before deploy" >&2
          test -f "$app_dir/SpeedRunners.Scheduler/App.config" || echo "Missing Scheduler App.config before deploy" >&2
          bash "$app_dir/scripts/deploy-prod.sh"
