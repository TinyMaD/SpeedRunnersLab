name: Build & Deploy to Production

# 仅手动触发：在 Actions 页面点 "Run workflow"
on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签（留空则用 git 短 sha）'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  # ghcr.io 上用户名/组织名必须小写
  OWNER: ${{ github.repository_owner }}

jobs:
  # ---------- 决定本次构建用什么 tag ----------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.value }}
      owner_lc: ${{ steps.lc.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - id: set-tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - id: lc
        shell: bash
        run: echo "value=$(echo '${{ env.OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  # ---------- 三个镜像并行构建 + 推 ghcr.io ----------
  build-api:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./SpeedRunners.API
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-api:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-api:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-ui:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./SpeedRunners.UI
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-ui:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-ui:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,scope=ui,mode=max

  build-scheduler:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./SpeedRunners.Scheduler
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-scheduler:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/srlab-scheduler:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=scheduler
          cache-to: type=gha,scope=scheduler,mode=max

  # ---------- ECS self-hosted runner 本机拉镜像并启动 ----------
  deploy:
    needs: [prepare, build-api, build-ui, build-scheduler]
    if: github.ref == 'refs/heads/master'
    runs-on: [self-hosted, speedrunners-prod]
    timeout-minutes: 30
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Roll out new images on ECS
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          GHCR_OWNER: ${{ needs.prepare.outputs.owner_lc }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_URL: ${{ github.server_url }}/${{ github.repository }}.git
          DEPLOY_BRANCH: master
          COMPOSE_PARALLEL_LIMIT: "1"
          DEPLOY_STEP_TIMEOUT_SECONDS: "900"
          DEPLOY_LOW_IMPACT_SLEEP_SECONDS: "8"
          PRUNE_IMAGES: "false"
        run: bash scripts/deploy-prod.sh
