server {
  listen 80;
  server_name cdn.speedrunners.cn;
  root /usr/share/nginx/html;
  index index.html index.htm;

  # index.html 与版本探测文件必须每次回源校验，避免浏览器/CDN 缓存导致拿到旧版本
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  location = /verify.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  # 带 contenthash 的静态资源可长期缓存（文件名变了浏览器自动拉新）
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
server {
  listen 443 ssl;
  server_name api.speedrunners.cn;
  # SSL证书放在SpeedRunners.UI/nginx/下
  ssl_certificate /etc/nginx/conf.d/api.speedrunners.cn.crt;
  ssl_certificate_key /etc/nginx/conf.d/api.speedrunners.cn.key;
  
  if ($http_origin != "https://www.speedrunners.cn") {
    return 403;
  }
  
  location / {
    proxy_pass http://srlab-api/;
  }
}
server {
  listen 80;
  server_name speedrunners.cn;
  return 301 https://www.$server_name$request_uri;
}